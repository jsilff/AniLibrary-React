name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve npm version
        id: version
        run: echo "number=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Published to npm as [@jsilff/anilibrary-react@${{ steps.version.outputs.number }}](https://www.npmjs.com/package/@jsilff/anilibrary-react/v/${{ steps.version.outputs.number }}).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
